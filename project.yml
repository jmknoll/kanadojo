name: KanaFlow
options:
  bundleIdPrefix: com.jmknoll
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  SWIFT_VERSION: "5.9"
  ENABLE_PREVIEWS: "YES"

targets:
  KanaFlow:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: KanaFlow
        excludes:
          - "**/*.md"
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_NAME: KanaFlow
        PRODUCT_BUNDLE_IDENTIFIER: com.jmknoll.KanaFlow
        INFOPLIST_FILE: KanaFlow/App/Info.plist
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
